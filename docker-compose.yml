version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-backend
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT}
      - HOST=${HOST}
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./backend/data:/app/data
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-frontend
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:${API_PORT}
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
